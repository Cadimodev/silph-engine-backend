<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silph Engine - Expansions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1d20; color: #f8f9fa; }
        .card { background-color: #212529; border: 1px solid #373b3e; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #ffcb05; }
        .img-container { background-color: #2b3035; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .logo-img { max-height: 80px; max-width: 80%; object-fit: contain; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: app-navbar}"></div>

<div class="container mt-5">

    <div class="row justify-content-center mb-5">
        <div class="col-md-8 text-center">
            <h2 class="mb-3 text-white-50">Explore the Backend Ecosystem</h2>
            <form th:action="@{/cards}" method="get">
                <input type="text" name="search" class="form-control form-control-lg bg-dark text-white border-secondary"
                       placeholder="🔍 Search for cards globally... (e.g., Pikachu, Raging Bolt)">
            </form>
        </div>
    </div>

    <div class="mb-4">
        <span class="text-white-50 me-3">Series Filter:</span>
        <div class="btn-group" role="group">
            <a href="#" class="btn btn-sm btn-warning fw-bold">ALL</a>
            <a href="#" class="btn btn-sm btn-outline-secondary text-light">Scarlet & Violet</a>
            <a href="#" class="btn btn-sm btn-outline-secondary text-light">Sword & Shield</a>
        </div>
    </div>

    <h3 class="text-warning fw-bold mb-4">Expansions</h3>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="exp : ${expansions}">
            <div class="card h-100 p-3 rounded-3 shadow-sm">

                <div class="img-container mb-3">
                    <img th:src="${exp.logoUrl != null ? exp.logoUrl + '.png' : 'https://via.placeholder.com/150x80?text=No+Logo'}"
                         alt="Expansion Logo" class="logo-img">
                </div>

                <h5 class="card-title text-light fw-bold mb-1" th:text="${exp.name}">Paldea Evolved</h5>
                <div class="small text-white-50 mb-3">
                    Code: <strong class="text-warning" th:text="${exp.externalId}">SV02</strong>
                </div>

                <div class="small mb-1">Cards: <span th:text="${exp.totalCards}">193</span></div>
                <div class="small text-white-50 mb-4">Released: <span th:text="${exp.releaseDate}">2023-06-09</span></div>

                <a th:href="@{/expansions/{id}/cards(id=${exp.externalId})}" class="btn btn-sm btn-outline-warning w-100 mt-auto">
                    View Cards &rarr;
                </a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pager(${page}, '/expansions', null, 'justify-content-center')}"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
