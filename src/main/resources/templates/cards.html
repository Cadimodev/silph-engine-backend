<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilphEngine - Card Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1d20; color: #f8f9fa; }
        .card { background-color: #212529; border: 1px solid #373b3e; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #ffcb05; }
        .card-img-container { background-color: #1a1d20; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: app-navbar}"></div>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 fw-bold text-warning mb-0"
                th:text="${expansionName != null} ? 'Set: ' + ${expansionName} : (${searchQuery != null} ? 'Search Results' : 'Card Catalog')">
                Card Catalog
            </h1>
            <p class="text-white-50 small mb-0"
               th:text="${searchQuery != null} ? 'Showing results for: ' + ${searchQuery} : 'Explore synchronized database records'">
                Explore synchronized database records
            </p>
        </div>
        <span class="badge bg-warning text-dark fs-6 px-3 py-2 fw-bold" th:text="${totalItems} + ' Cards Found'">0 Cards</span>
    </div>

    <div th:if="${cards.isEmpty()}" class="alert alert-info bg-secondary text-white border-0 text-center py-4" role="alert">
        <h4 class="alert-heading text-warning">No cards found!</h4>
        <p class="mb-0">Please run the catalog synchronizer or seed the database to populate the collection.</p>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" th:unless="${cards.isEmpty()}">

        <div class="col" th:each="card : ${cards}">
            <div class="card h-100 p-2 shadow-lg">

                <div class="card-img-container p-3">
                    <img th:src="${card.imageUrl != null ? card.imageUrl + '/low.png' : 'https://placehold.co/250x350/212529/FFF?text=No+Image'}"
                         class="img-fluid" alt="Pokemon Card Art" style="max-height: 280px; object-fit: contain;">
                </div>

                <div class="card-body d-flex flex-column justify-content-between pt-3">
                    <div>
                        <h5 class="card-title text-warning fw-bold text-truncate mb-2" th:text="${card.name}">Card Name</h5>

                        <div class="small text-white-50 mb-1">
                            <span class="fw-bold text-secondary">Category:</span>
                            <span th:text="${card.cardCategory != null ? card.cardCategory : 'N/A'}">Pokémon</span>
                        </div>

                        <div class="small text-white-50 mb-1" th:if="${card.types != null and !card.types.isEmpty()}">
                            <span class="fw-bold text-secondary">Types:</span>
                            <span th:each="type, iterStat : ${card.types}">
                                <span th:text="${type}">Fire</span><th:block th:if="${!iterStat.last}">, </th:block>
                            </span>
                        </div>

                        <div class="small text-white-50">
                            <span class="fw-bold text-secondary">Rarity:</span>
                            <span th:text="${card.rarity != null ? card.rarity : 'N/A'}">Common</span>
                        </div>
                    </div>

                    <div class="mt-4">
                        <a th:href="@{/cards/{id}(id=${card.externalId})}" class="btn btn-outline-warning btn-sm w-100 fw-semibold">
                            View Details
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments/pagination :: pager(${page}, ${baseUrl}, ${searchQuery}, 'justify-content-center')}"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
