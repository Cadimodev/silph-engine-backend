<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilphEngine - Card Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="/cards">SilphEngine</a>
        <div class="d-flex align-items-center">
            <span class="navbar-text me-3 small text-uppercase fw-semibold tracking-wider">Dashboard</span>
            <form th:action="@{/logout}" method="POST" class="m-0">
                <button type="submit" class="btn btn-outline-danger btn-sm fw-bold">Sign Out</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 fw-bold text-warning mb-0">Card Catalog</h1>
            <p class="text-light-50 small mb-0">Explore synchronized database records</p>
        </div>
        <span class="badge bg-warning text-dark fs-6 px-3 py-2 fw-bold" th:text="${cards.size()} + ' Cards Loaded'">0 Cards</span>
    </div>

    <div th:if="${cards.isEmpty()}" class="alert alert-info bg-secondary text-white border-0 text-center py-4" role="alert">
        <h4 class="alert-heading text-warning">No cards found!</h4>
        <p class="mb-0">Please run the catalog synchronizer or seed the database to populate the collection.</p>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" th:unless="${cards.isEmpty()}">

        <div class="col" th:each="card : ${cards}">
            <div class="card h-100 bg-secondary text-white border-0 shadow-lg">

                <img th:src="${card.imageUrl != null ? card.imageUrl + '/low.png' : 'https://placehold.co/250x350/212529/FFF?text=No+Image'}"
                     class="card-img-top p-3" alt="Pokemon Card Art" style="max-height: 340px; object-fit: contain;">

                <div class="card-body d-flex flex-column justify-content-between pt-0">
                    <div>
                        <h5 class="card-title text-warning fw-bold text-truncate mb-2" th:text="${card.name}">Card Name</h5>

                        <div class="small text-light-50 mb-1">
                            <span class="fw-bold text-white-50">Category:</span>
                            <span th:text="${card.cardCategory != null ? card.cardCategory : 'N/A'}">Pokémon</span>
                        </div>

                        <div class="small text-light-50 mb-1" th:if="${card.types != null and !card.types.isEmpty()}">
                            <span class="fw-bold text-white-50">Types:</span>
                            <span th:each="type, iterStat : ${card.types}">
                                    <span th:text="${type}">Fire</span><th:block th:if="${!iterStat.last}">, </th:block>
                                </span>
                        </div>

                        <div class="small text-light-50">
                            <span class="fw-bold text-white-50">Rarity:</span>
                            <span th:text="${card.rarity != null ? card.rarity : 'N/A'}">Common</span>
                        </div>
                    </div>

                    <div class="mt-4">
                        <a href="#" class="btn btn-outline-warning btn-sm w-100 fw-semibold">View Details</a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="d-flex justify-content-center mt-5" th:if="${totalPages > 1}">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link bg-secondary text-warning border-secondary"
                       th:href="@{/cards(page=${currentPage - 1})}" tabindex="-1">Previous</a>
                </li>

                <li class="page-item disabled">
                        <span class="page-link bg-dark text-light border-secondary">
                            Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
                        </span>
                </li>

                <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a class="page-link bg-secondary text-warning border-secondary"
                       th:href="@{/cards(page=${currentPage + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>

</div>

</body>
</html>
