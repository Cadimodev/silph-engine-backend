<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilphEngine - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card bg-secondary text-white border-0 shadow-lg p-4">
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-warning">SilphEngine</h1>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger text-center py-2 small" role="alert" th:text="${errorMessage}">
                    Error
                </div>

                <div th:if="${logoutMessage}" class="alert alert-success text-center py-2 small" role="alert" th:text="${logoutMessage}">
                    Logout exitoso
                </div>

                <form th:action="@{/login}" method="POST">

                    <div class="mb-3">
                        <label for="username" class="form-label small fw-bold text-warning">Nickname</label>
                        <input type="text" id="username" name="username" class="form-control bg-dark text-white border-secondary" placeholder="Nickname" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold text-warning">Password</label>
                        <input type="password" id="password" name="password" class="form-control bg-dark text-white border-secondary" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 fw-bold text-dark py-2 shadow-sm mb-3">
                        Log In
                    </button>

                    <div class="text-center">
                        <a href="/view/register" class="link-warning small text-decoration-none">Don't have an account? Register here</a>
                    </div>
                </form>

            </div>

            <div class="text-center mt-3">
                <a href="/view/cards" class="text-light-50 small text-decoration-none">← Return to homepage</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
