<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilphEngine - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login-register.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: app-navbar}"></div>

<div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 56px);">
    <div class="row justify-content-center" style="width: 100%;">
        <div class="col-md-5">

            <div class="card auth-card shadow-lg p-4 rounded-3">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-warning">Silph Engine</h2>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger text-center py-2 small" role="alert" th:text="${errorMessage}">
                    Error
                </div>

                <div th:if="${logoutMessage}" class="alert alert-success text-center py-2 small" role="alert" th:text="${logoutMessage}">
                    Logout successfully
                </div>

                <form th:action="@{/login}" method="POST" class="auth-form">

                    <div class="mb-3">
                        <label for="username" class="form-label text-warning">Nickname</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Nickname" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-warning">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-warning fw-bold py-2 shadow-sm">
                            Log In
                        </button>
                    </div>

                    <div class="text-center">
                        <span class="text-white-50 small">Don't have an account? </span>
                        <a th:href="@{/register}" class="link-warning small text-decoration-none fw-bold">Register here</a>
                    </div>
                </form>

            </div>

            <div class="text-center mt-3">
                <a th:href="@{/}" class="text-white-50 small text-decoration-none">← Return to homepage</a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
