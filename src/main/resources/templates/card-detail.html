<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${card.name} + ' - SilphEngine'">SilphEngine - Card Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/card-detail.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: app-navbar}"></div>

<div class="container mt-5">

    <div class="mb-4">
        <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm fw-semibold">
            &larr; Back to List
        </a>
    </div>

    <div class="row g-5">

        <div class="col-12 col-md-5 text-center">
            <div class="p-4 card-large-container d-flex align-items-center justify-content-center">
                <img th:src="${card.imageUrl != null ? card.imageUrl + '/high.png' : 'https://placehold.co/400x550/212529/FFF?text=No+Image'}"
                     class="img-fluid img-detail" alt="Pokemon Card Art High Res">
            </div>
        </div>

        <div class="col-12 col-md-7">

            <div class="mb-3">
                <span class="badge bg-warning text-dark fw-bold mb-2" th:text="${card.rarity}">Common</span>
                <h1 class="text-warning fw-bold display-5 mb-1" th:text="${card.name}">Weedle</h1>
                <p class="text-white-50 fs-5" th:text="${expansionName}">Chaos Rising</p>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-4">
                <span class="badge badge-meta px-3 py-2 fs-6">
                    <strong>Category:</strong> <span th:text="${card.cardCategory}">POKÉMON</span>
                </span>
                <span class="badge badge-meta px-3 py-2 fs-6" th:if="${card.types != null and !card.types.isEmpty()}">
                    <strong>Type:</strong>
                    <span th:each="type, iter : ${card.types}">
                        <span th:text="${type}">GRASS</span><th:block th:if="${!iter.last}">, </th:block>
                    </span>
                </span>
            </div>

            <div class="mb-4">
                <button class="btn btn-warning btn-lg w-100 fw-bold text-dark shadow-sm"
                        data-bs-toggle="modal" data-bs-target="#addCardModal">
                    + Add Copy to Inventory
                </button>
            </div>

            <div th:if="${quantity > 0}" class="mb-4">
                <h3 class="h5 text-white fw-bold mb-3">Your Collection</h3>

                <div th:each="item : ${inventory}" class="p-3 inventory-box mb-3 shadow-sm">
                    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">

                        <div>
                            <div class="fw-bold text-warning fs-5">
                                <span th:text="${#strings.capitalizeWords(#strings.toLowerCase(item.cardFinish.name().replace('_', ' ')))}">Standard</span>
                            </div>

                            <small class="text-white-50">
                                Condition: <strong class="text-light"
                                                   th:text="${#strings.capitalizeWords(#strings.toLowerCase(item.cardCondition.name().replace('_', ' ')))}">Near Mint</strong>
                            </small>
                        </div>

                        <div class="d-flex align-items-center gap-3 bg-dark p-2 rounded border border-secondary">
                            <button class="btn btn-sm btn-outline-danger fw-bold px-3 py-1"
                                    th:onclick="updateQuantity([[${item.id}]], -1)">&minus;</button>

                            <span class="fs-4 fw-bold text-light px-1"
                                  th:id="'qty-' + ${item.id}"
                                  th:text="${item.quantity}">1</span>

                            <button class="btn btn-sm btn-outline-success fw-bold px-3 py-1"
                                    th:onclick="updateQuantity([[${item.id}]], 1)">&plus;</button>
                        </div>

                    </div>
                </div>
            </div>

            <div th:unless="${quantity > 0}" class="alert alert-secondary bg-dark border-secondary text-white-50 text-center small py-3" role="alert">
                You don't have any copies of this card yet.
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="addCardModal" tabindex="-1" aria-labelledby="addCardModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-2">

            <div class="modal-header border-0">
                <div>
                    <h5 class="modal-title fw-bold fs-4 text-warning" id="addCardModalLabel" th:text="'Add ' + ${card.name}">Add Weedle</h5>
                    <small class="text-white-50" th:text="${expansionName}">Chaos Rising</small>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-shadow="none" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form id="addCardForm">
                    <div class="row g-3">

                        <div class="col-4">
                            <label for="modalQuantity" class="form-label small fw-bold text-white-50">Quantity</label>
                            <input type="number" class="form-control" id="modalQuantity" value="1" min="1" required>
                        </div>

                        <div class="col-8">
                            <label for="modalCondition" class="form-label small fw-bold text-white-50">Condition</label>
                            <select class="form-select" id="modalCondition">
                                <option th:each="cond : ${conditions}"
                                        th:value="${cond.name()}"
                                        th:text="${#strings.capitalizeWords(#strings.toLowerCase(cond.name().replace('_', ' ')))}">
                                    Near Mint
                                </option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label for="modalVariant" class="form-label small fw-bold text-white-50">Finish / Version</label>
                            <select class="form-select" id="modalVariant">
                                <option th:each="finish : ${finishes}"
                                        th:value="${finish.name()}"
                                        th:text="${#strings.capitalizeWords(#strings.toLowerCase(finish.name().replace('_', ' ')))}">
                                    Standard
                                </option>
                            </select>
                        </div>

                    </div>
                </form>
            </div>

            <div class="modal-footer border-0 row g-2">
                <div class="col-6 m-0 pe-1">
                    <button type="button" class="btn btn-outline-secondary w-100 fw-semibold text-light" data-bs-dismiss="modal">Cancel</button>
                </div>
                <div class="col-6 m-0 ps-1">
                    <button type="button" class="btn btn-warning w-100 fw-bold text-dark" th:onclick="submitToInventory([[${card.id}]])">Add Copy</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script th:inline="javascript">

    const refreshPage = () => window.location.reload();

    async function submitToInventory(cardId) {
        const payload = {
            cardId: cardId,
            quantity: parseInt(document.getElementById('modalQuantity').value),
            cardCondition: document.getElementById('modalCondition').value,
            cardFinish: document.getElementById('modalVariant').value
        };

        try {
            const response = await fetch('/cards/collection', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const modalElement = document.getElementById('addCardModal');
            const modal = bootstrap.Modal.getInstance(modalElement);
            if (modal) modal.hide();

            refreshPage();

        } catch (error) {
            console.error("Error adding card:", error);
            alert("Could not add card to collection.");
        }
    }

    async function updateQuantity(entryId, changeValue) {
        try {
            const response = await fetch(`/cards/collection/${entryId}/quantity?change=${changeValue}`, {
                method: 'POST'
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            refreshPage();

        } catch (error) {
            console.error("Error altering the inventory quantity:", error);
            alert("Could not update item quantity.");
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
