<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silph Engine - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: app-navbar}"></div>

<div class="container hero-section">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <img th:src="@{/images/logo.png}" src="https://via.placeholder.com/400x200?text=Silph+Engine" alt="Silph Engine Logo" class="hero-img">

            <h1 class="display-4 fw-bold mb-3 text-warning">Silph Engine</h1>
            <p class="lead text-secondary mb-4">
                The ultimate backend ecosystem for Pokémon TCG management and deck validation.
                Explore synchronized expansions, build physical format databases, and enforce tournament legality guidelines seamlessly.
            </p>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a th:href="@{/expansions}" class="btn btn-warning btn-lg px-4 gap-3 fw-bold">Explore Catalog</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
