<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silph Engine - Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: app-navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4 rounded-3">
                <h2 class="text-center text-warning fw-bold mb-4">Create Account</h2>

                <div th:if="${businessError}" class="alert alert-danger py-2" th:text="${businessError}"></div>

                <form th:action="@{/register}" th:object="${userRequest}" method="post" novalidate>

                    <div class="mb-3">
                        <label for="nickname" class="form-label text-white-50">Username</label>
                        <input type="text" th:field="*{nickname}" id="nickname"
                               class="form-control" th:classappend="${#fields.hasErrors('nickname')} ? 'is-invalid'" placeholder="TrainerName">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label text-white-50">Email Address</label>
                        <input type="email" th:field="*{email}" id="email"
                               class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="trainer@silph.com">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-white-50">Password</label>
                        <input type="password" th:field="*{password}" id="password"
                               class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="••••••••">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-warning fw-bold py-2">Register</button>
                    </div>

                    <div class="text-center mt-3">
                        <span class="text-white-50">Already have an account? </span>
                        <a th:href="@{/login}" class="text-warning text-decoration-none fw-bold">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
