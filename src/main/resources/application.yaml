spring:
  application:
    name: silph-engine

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/${DB_NAME:silphengine_db}
    username: ${DB_USERNAME:dev_user}
    password: ${DB_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080