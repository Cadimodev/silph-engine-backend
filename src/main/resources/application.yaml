spring:
  application:
    name: silph-engine

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/${DB_NAME:silphengine_db}?charSet=UTF-8&characterEncoding=UTF-8
    username: ${DB_USERNAME:dev_user}
    password: ${DB_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8

server:
  port: 8080

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:B8a90mvet9GHVEyhRoNzMH4u9gJObOzFBkz12PS4wds=}
      access-token:
        expiration: 3600000 # 1 hour
      refresh-token:
        expiration: 604800000 # 7 days

# ===================================================================
# FORMAT CONFIGURATION
# ===================================================================
pokemon:
  tcg:
    format:
      standard-valid-marks:
        - H
        - I
        - J